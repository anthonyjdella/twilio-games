<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Garage — Model Viewer & Config</title>
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; background: #0b1020; overflow: hidden;
      font-family: system-ui, sans-serif; color: #e8ecf6; }
    #app { position: fixed; inset: 0; }
    #bar { position: fixed; top: 14px; left: 14px; right: 14px; display: flex; gap: 10px;
      align-items: center; flex-wrap: wrap; background: rgba(16,22,40,.86); border: 1px solid #38425e;
      border-radius: 12px; padding: 10px 14px; backdrop-filter: blur(6px); z-index: 10; }
    #bar strong { font-size: 15px; margin-right: 4px; }
    label.fld { font-size: 12px; opacity: .85; display: flex; flex-direction: column; gap: 3px; }
    select, input[type=text], input[type=number] {
      background: #1a2030; color: #e8ecf6; border: 1px solid #38425e; border-radius: 8px;
      padding: 7px 9px; font: inherit; font-size: 13px; }
    #bar select { min-width: 190px; }
    .seg { display: flex; gap: 4px; }
    .seg button, .gbtn { background: #232b45; color: #e8ecf6; border: 1px solid #38425e;
      border-radius: 8px; padding: 7px 11px; font: inherit; font-size: 13px; cursor: pointer; }
    .seg button.on { outline: 2px solid #36d1dc; }
    #save { background: #ef223a; border: none; }
    #status { font-size: 12px; color: #36e08a; min-width: 70px; }
    a.back { color: #cdd5e0; font-size: 12px; text-decoration: none; }
    /* Left config panel */
    #panel { position: fixed; top: 80px; left: 14px; width: 240px; background: rgba(16,22,40,.9);
      border: 1px solid #38425e; border-radius: 12px; padding: 14px; z-index: 9; display: flex;
      flex-direction: column; gap: 10px; max-height: calc(100vh - 110px); overflow: auto; }
    #panel h4 { margin: 6px 0 2px; font-size: 13px; opacity: .85; }
    #panel .hint { font-size: 11px; opacity: .6; }
    .row3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px; }
    /* Bottom scrub bar (clip mode) */
    #scrub { position: fixed; bottom: 14px; left: 270px; right: 14px; background: rgba(16,22,40,.9);
      border: 1px solid #38425e; border-radius: 12px; padding: 10px 14px; z-index: 9; display: none;
      align-items: center; gap: 12px; }
    #scrub input[type=range] { flex: 1; }
    #scrub.show { display: flex; }
  </style>
</head>
<body>
  <div id="app"></div>

  <div id="bar">
    <strong>Garage</strong>
    <label class="fld">Model <select id="model"></select></label>
    <!-- Reorder the CAR-SELECT order: move the selected car earlier/later in the roster. Only active
         for car entries (barrier/boost/props aren't ordered). Save writes the new order to the manifest. -->
    <div>
      <div style="font-size:12px;opacity:.85;margin-bottom:3px">Car order</div>
      <div class="seg">
        <button id="moveUp" title="Move this car earlier in the selection grid">◀ Move up</button>
        <button id="moveDown" title="Move this car later in the selection grid">Move down ▶</button>
      </div>
    </div>
    <div>
      <div style="font-size:12px;opacity:.85;margin-bottom:3px">Mode</div>
      <div class="seg" id="mode">
        <button data-mode="static">Static</button>
        <button data-mode="wheels">Wheel-spin</button>
        <button data-mode="clip">Play clip</button>
      </div>
    </div>
    <button class="gbtn" id="turntable">Turntable: on</button>
    <button class="gbtn" id="save">Save manifest</button>
    <span id="status"></span>
    <span style="flex:1"></span>
    <a class="back" href="/editor">Level Editor</a>
  </div>

  <div id="panel">
    <h4>This model</h4>
    <label class="fld">Display name <input id="name" type="text" placeholder="(optional)" /></label>
    <label class="fld">GLB file <select id="file"></select></label>
    <label class="fld">Role <select id="role"></select></label>
    <h4>Size &amp; orientation</h4>
    <label class="fld">Scale <input id="scale" type="number" step="0.05" /></label>
    <h4>Rotation°</h4>
    <div class="row3">
      <input id="rx" type="number" step="1" title="Rot X" />
      <input id="ry" type="number" step="1" title="Rot Y" />
      <input id="rz" type="number" step="1" title="Rot Z" />
    </div>
    <h4>Offset</h4>
    <div class="row3">
      <input id="ox" type="number" step="0.1" title="Off X" />
      <input id="oy" type="number" step="0.1" title="Off Y" />
      <input id="oz" type="number" step="0.1" title="Off Z" />
    </div>
    <h4>Animation</h4>
    <label class="fld">Clip <select id="clip"></select></label>
    <label class="fld" style="flex-direction:row;align-items:center;gap:8px">
      <input id="useanim" type="checkbox" /> Use in game
    </label>
    <div class="hint">"Use in game" plays this model's clip during a race (off = static + wheel-spin).
      Many clips just open doors — check with Play clip first.</div>
  </div>

  <div id="scrub">
    <button class="gbtn" id="playpause">Pause</button>
    <label class="fld" style="flex-direction:row;align-items:center;gap:6px">Speed
      <input id="speed" type="range" min="0.25" max="4" step="0.25" value="1" style="width:90px" />
      <span id="speedval" style="font-size:12px;width:30px">1×</span>
    </label>
    <input id="time" type="range" min="0" max="1" step="0.001" value="0" />
    <span id="timeval" style="font-size:12px;width:90px">0.0 / 0.0s</span>
  </div>

  <script type="module" src="./garage.ts"></script>
</body>
</html>
