# Azure Container App spec for Voice Racer. Rendered by deploy.yml via envsubst (${APP_NAME},
# ${CONTAINER_IMAGE}, ${BASE_URL}, ${ACR_SERVER}, ${ACR_USERNAME}, ${ACR_PASSWORD}). One revision
# carries image + registry + env + mount.
#
# SINGLE REPLICA IS REQUIRED, not a tuning choice: room/lobby/race state is in-memory in ONE
# process and the game/voice WebSockets are long-lived to it. Two replicas would let a player and
# the shared display land on different instances and never see the same race. minReplicas:1 also
# avoids scale-to-zero cold starts dropping the display's socket.
#
# NOTE: no top-level `tags:` here — `az containerapp create --yaml` rejects a tags sibling of
# properties ("JSON value could not be converted to System.Boolean, Path: $"). The required
# created_by tag (tenant policy) is passed via the `--tags` CLI flag on create, then preserved on
# subsequent `update --yaml` runs (update keeps existing tags). Matches the cartoon-printer pattern.
properties:
  configuration:
    ingress:
      external: true
      targetPort: 8080
      transport: auto            # supports the WebSocket upgrade for /game and /voice
    # `update --yaml` REPLACES the whole secrets+registries config, so we must redeclare the ACR
    # registry + its password secret here (else the auto-created registry secret is dropped and the
    # registry's PasswordSecretRef dangles → "PasswordSecretRef not found").
    secrets:
      - name: twilio-token
      - name: editor-token
      - name: acr-password
        value: ${ACR_PASSWORD}
    registries:
      - server: ${ACR_SERVER}
        username: ${ACR_USERNAME}
        passwordSecretRef: acr-password
  template:
    containers:
      - name: ${APP_NAME}
        image: ${CONTAINER_IMAGE}
        # 2 CPU / 4Gi (not 1/2): at 1 CPU the container was CPU-STARVED — even /healthz (a no-op)
        # swung 2–12s on an idle container and large GLBs crawled (~50KB/s; the 7.8MB monster-truck
        # model timed out), so the deployed menu/3D-background was very delayed. The single Node
        # process runs the game/voice WS, the fixed-timestep sim loop, static serving (gzip + stream),
        # AND transpiles via tsx — it needs the headroom. Bumping to 2 CPU made /healthz steady ~0.4s
        # and cut the JS bundle from ~8.6s to 0.57s. (Valid Consumption pairs: 2.0 CPU ↔ 4Gi.)
        resources:
          cpu: 2.0
          memory: 4Gi
        env:
          - name: PORT
            value: "8080"
          - name: NODE_ENV
            value: production
          # Public base URL for Twilio webhooks (the app derives the wss:// game/voice URLs from it).
          - name: PUBLIC_BASE_URL
            value: ${BASE_URL}
          # The phone number players CALL to join, shown + QR-encoded on the lobby screen. Rendered
          # from the GAME_PHONE_NUMBER repo variable via envsubst; empty → the lobby shows a placeholder.
          - name: GAME_PHONE_NUMBER
            value: "${GAME_PHONE_NUMBER}"
          # Persistent data dir (Azure Files mount) — start.sh symlinks /app/data here.
          - name: DATA_MOUNT
            value: /app/appdata
          # Twilio webhook signature validation is ON whenever this is set (fail-closed in index.ts).
          - name: TWILIO_AUTH_TOKEN
            secretRef: twilio-token
          # Gate the editor's /api writes on a public deploy. Empty = writes open (not recommended public).
          - name: EDITOR_TOKEN
            secretRef: editor-token
          # ElevenLabs voiceId for Conversation Relay talk-back (greeting/countdown/result to callers).
          # Empty → Relay's default voice (talk-back still speaks). Set to a high-energy sports-
          # announcer voiceId from the ElevenLabs library for the racing vibe. Rendered via envsubst
          # from the CR_TTS_VOICE repo variable (falls back to empty if unset).
          - name: CR_TTS_VOICE
            value: "${CR_TTS_VOICE}"
          # Conversational AI host (OpenAI). Rendered from the OPENAI_API_KEY GitHub secret via
          # envsubst — a PLAIN env value (not a Container App secretRef) so the deploy works whether
          # the key is set OR unset: empty → the server disables the AI and falls back to scripted
          # phrase-bank lines (never breaks). A valueless secretRef fails when the secret was never
          # created (the empty-key case), which is why this is a plain env. OPENAI_MODEL is an
          # optional repo var (empty → server default).
          - name: OPENAI_API_KEY
            value: "${OPENAI_API_KEY}"
          - name: OPENAI_MODEL
            value: "${OPENAI_MODEL}"
        volumeMounts:
          - volumeName: appdata
            mountPath: /app/appdata
    scale:
      minReplicas: 1
      maxReplicas: 1
    volumes:
      - name: appdata
        storageName: appdata
        storageType: AzureFile
